# Klario — static PWA, no build step
[build]
  publish = "."
  command = ""

# Long-cache the heavy libs (they're versioned/stable); keep HTML fresh
[[headers]]
  for = "/pdf.worker.min.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
[[headers]]
  for = "/pdf.min.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
